services:
  # La base de données prod est distante, donc on ne la déclare pas ici

  ecommerce-symfony-s:
    container_name: "ecommerce-symfony-c"
    build:
      context: ../
      dockerfile: ".docker/symfony/Dockerfile.prod"
    env_file:
      - "symfony/.env.prod"
    restart: always
    ports:
      - "9000:9000"
    networks:
      - ecommerce-network

  ecommerce-nginx-s:
    container_name: "ecommerce-nginx-c"
    build:
      context: ../
      dockerfile: ".docker/nginx/Dockerfile.prod"
    env_file:
      - "nginx/.env.prod"
    restart: always
    ports:
      - "42424:80"
    networks:
      - ecommerce-network
    depends_on:
      - ecommerce-symfony-s

networks:
  ecommerce-network:
    driver: bridge